name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Debug - Check files
        run: |
          pwd
          ls -la
          echo "Looking for package.json..."
          cat package.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Verify installation
        run: |
          npm list --depth=0
          echo "Dependencies installed successfully"

  run-ui-flows:
    name: Run UI Tests - Chromium
    needs: prepare
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      
      - name: Create auth directory
        run: mkdir -p .auth
      
      - name: Run Playwright tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          CI: true
        run: npx playwright test --project=chromium
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-chromium-${{ github.run_attempt }}
          path: test-results/
          retention-days: 30
      
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 30

  create-report:
    name: Create Report
    needs: run-ui-flows
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
        continue-on-error: true
      
      - name: Display structure of downloaded files
        run: ls -R all-artifacts || echo "No artifacts found"
      
      - name: Merge test results
        run: |
          mkdir -p merged-report
          find all-artifacts -name "*.json" -path "*/test-results/*" -exec cp {} merged-report/ \; 2>/dev/null || echo "No test results to merge"
        continue-on-error: true
      
      - name: Upload merged report
        uses: actions/upload-artifact@v4
        if: hashFiles('merged-report/*') != ''
        with:
          name: merged-test-report-${{ github.run_attempt }}
          path: merged-report/
          retention-days: 30
        continue-on-error: true
      
      - name: Upload all HTML reports
        uses: actions/upload-artifact@v4
        with:
          name: all-html-reports-${{ github.run_attempt }}
          path: all-artifacts/playwright-report-*/
          retention-days: 30
          if-no-files-found: ignore
